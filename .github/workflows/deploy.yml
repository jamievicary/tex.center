name: Deploy to Fly

# Continuous deployment for the control-plane app at tex.center.
# On every push to `main` we ship the apps/web image to the
# pre-existing Fly app `tex-center` via Fly's remote builder.
#
# Prerequisites (one-shot, manual):
#   - `flyctl apps create tex-center` (uses fly.toml at repo root).
#   - `gh secret set FLY_API_TOKEN < creds/fly.token` on
#     github.com/jamievicary/tex.center.

on:
  push:
    branches: [main]

# Serialise deploys: queue rather than cancel, so a fast follow-up
# push doesn't strand a half-rolled-out Machine.
concurrency:
  group: fly-deploy
  cancel-in-progress: false

jobs:
  # M8.smoke.0 — build the production runtime image and probe every
  # server endpoint for module-load failures before deploying. Catches
  # the iter-129 incident class (adapter-node externalised npm dep
  # missing from runtime stage) at PR time instead of in production.
  smoke:
    name: runtime image smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - run: bash scripts/smoke-runtime-image.sh

  deploy:
    name: flyctl deploy
    needs: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: compute autodev iter
        id: iter
        run: echo "iter=$(ls .autodev/logs/*.md | wc -l | tr -d ' ')" >> "$GITHUB_OUTPUT"
      - run: flyctl deploy --remote-only --config fly.toml --dockerfile apps/web/Dockerfile --build-arg TEXCENTER_ITER=${{ steps.iter.outputs.iter }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # NOTE: M8.pw.4 (verifyLiveFullPipeline) used to run here as a
  # `live-pipeline` job after `deploy`. Per iter 166 it has moved
  # into `tests_gold/cases/test_playwright.py::TestPlaywrightLive`
  # so every iteration's gold suite exercises the live product loop.
  # CI duplicating it would only add latency, since the iter loop
  # runs strictly earlier than CD.
